{% load static %}
<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>درگاه پرداخت</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'theme/assets/images/favicon_io/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'theme/assets/images/favicon_io/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'theme/assets/images/favicon_io/favicon-16x16.png' %}">
    <link rel="stylesheet" href="{% static 'theme/assets/css/app.css' %}">
    <link rel="preload" href="{% static 'theme/assets/fonts/payda/PeydaWebFaNum-Medium.woff2' %}" as="font" type="font/woff2" crossorigin>
</head>
<body class="bg-gray-100 dark:bg-zinc-900 text-text-primary-light dark:text-text-primary-dark transition-colors duration-200">

<div class="min-h-screen flex flex-col justify-center items-center p-4">
    <div class="w-full max-w-md bg-white dark:bg-zinc-800 rounded-2xl shadow-xl overflow-hidden border-t-4 border-blue-500">
        <!-- بنر درگاه -->
        <div class="p-6 text-center border-b border-gray-100 dark:border-gray-700">
            <div class="w-16 h-16 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 flex items-center justify-center mx-auto mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <h1 class="text-xl font-black text-blue-600">درگاه پرداخت اینترنتی</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">پذیرنده: فروشگاه هلو</p>
        </div>

        <!-- اطلاعات تراکنش -->
        <div class="p-6">
            <div class="bg-blue-50 dark:bg-blue-900/30 rounded-xl p-4 mb-6">
                <div class="flex justify-between items-center text-sm mb-2">
                    <span class="text-gray-600 dark:text-gray-300">کد ارجاع (Authority)</span>
                    <span class="font-bold text-gray-800 dark:text-white" dir="ltr">{{ transaction.authority }}</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600 dark:text-gray-300">مبلغ قابل پرداخت</span>
                    <span class="text-lg font-bold text-blue-600">{{ transaction.amount|floatformat:0 }} <span class="text-xs">تومان</span></span>
                </div>
            </div>

            <!-- فرم واقعی درگاه: غیرفعال (شبیه‌سازی ظاهری تا اتصال واقعی به بانک انجام شود) -->
            <div class="space-y-4 opacity-50">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">شماره کارت بانکی</label>
                    <input type="text" disabled placeholder="XXXX-XXXX-XXXX-XXXX" dir="ltr"
                           class="w-full px-4 py-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 dark:text-white text-center cursor-not-allowed">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">تاریخ انقضا</label>
                        <input type="text" disabled placeholder="MM/YY" dir="ltr"
                               class="w-full px-4 py-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 dark:text-white text-center cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">CVV2</label>
                        <input type="text" disabled placeholder="XXX" dir="ltr"
                               class="w-full px-4 py-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 dark:text-white text-center cursor-not-allowed">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">رمز پویا</label>
                    <input type="text" disabled placeholder="——————" dir="ltr"
                           class="w-full px-4 py-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 dark:text-white text-center cursor-not-allowed">
                </div>
                <button disabled class="w-full bg-gray-300 dark:bg-gray-600 text-white font-bold py-3 rounded-xl cursor-not-allowed">
                    پرداخت (درگاه واقعی به‌زودی متصل می‌شود)
                </button>
            </div>

            <!-- حالت آزمایشی: شبیه‌سازی نتیجه پرداخت -->
            <div class="mt-8 pt-6 border-t border-dashed border-gray-200 dark:border-gray-700">
                <p class="text-center text-xs text-gray-400 mb-4">حالت آزمایشی — برای تست فرآیند پرداخت یکی از دکمه‌های زیر را بزنید</p>
                <div class="flex gap-4">
                    <a href="{% url 'payments:callback' %}?Authority={{ transaction.authority }}&Status=OK"
                       class="flex-1 text-center bg-green-500 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">
                        پرداخت موفق (تست)
                    </a>
                    <a href="{% url 'payments:callback' %}?Authority={{ transaction.authority }}&Status=NOK"
                       class="flex-1 text-center bg-red-500 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition">
                        پرداخت ناموفق (تست)
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
