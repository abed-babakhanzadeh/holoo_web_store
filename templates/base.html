<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}فروشگاه هلو{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

<header class="bg-white shadow-sm py-4 mb-8">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-orange-500">فروشگاه هلو</a>
            
            <nav class="flex items-center gap-4">
                {% if request.user.is_authenticated %}
                    <div class="flex items-center gap-3 bg-gray-100 py-2 px-4 rounded-full">
                        <span class="text-sm font-bold text-gray-700" dir="ltr">{{ request.user.phone_number }}</span>
                        
                        <span class="text-xs bg-orange-200 text-orange-800 px-2 py-1 rounded">
                            {{ request.user.get_status_display }}
                        </span>

                        <button hx-post="{% url 'accounts:logout' %}" 
                                class="text-red-500 hover:text-red-700 text-sm font-bold mr-2">
                            خروج
                        </button>
                    </div>
                {% else %}
                    <a href="{% url 'accounts:login_view' %}" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-full transition duration-200">
                        ورود | ثبت‌نام
                    </a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-auto">
        <p class="text-sm">تمامی حقوق برای فروشگاه محفوظ است.</p>
    </footer>

</body>
</html>
