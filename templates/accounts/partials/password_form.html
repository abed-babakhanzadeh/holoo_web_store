<form hx-post="{% url 'accounts:login_password' %}"
      hx-target="#password-error-container"
      hx-swap="innerHTML"
      class="space-y-5">

    {% csrf_token %}

    <div>
        <label for="password_phone_number" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">شماره موبایل</label>
        <div class="relative">
            <input type="tel"
                   id="password_phone_number"
                   name="phone_number"
                   class="w-full ps-12 pe-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="09xxxxxxxxx"
                   required dir="ltr" autofocus>
            <div class="absolute input-icon top-1/2 transform -translate-y-1/2 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
            </div>
        </div>
    </div>

    <div>
        <label for="login_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">رمز عبور</label>
        <div class="relative">
            <input type="password"
                   id="login_password"
                   name="password"
                   class="w-full ps-4 pe-10 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="رمز عبور خود را وارد کنید"
                   required dir="ltr">
            <button type="button" class="absolute end-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" onclick="togglePassword('login_password')" aria-label="نمایش/مخفی‌کردن رمز">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </button>
        </div>
    </div>

    <div class="flex items-center justify-end">
        <button type="button"
                hx-get="{% url 'accounts:forgot_password_send' %}"
                hx-target="closest .auth-step-container"
                hx-swap="innerHTML"
                class="text-sm text-primary hover:opacity-80">
            رمز عبور را فراموش کرده‌اید؟
        </button>
    </div>

    <div id="password-error-container"></div>

    <button type="submit" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-primary-grad hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
        ورود به حساب
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ms-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
        </svg>
    </button>
</form>
