<div class="text-center mb-8">
    <h2 class="text-2xl font-bold text-dark dark:text-light mb-2">تعیین رمز عبور جدید</h2>
    <p class="text-gray-500 dark:text-gray-400">هویت شماره <span class="font-bold text-primary" dir="ltr">{{ phone_number }}</span> تایید شد؛ رمز عبور جدید را وارد کنید</p>
</div>

<form hx-post="{% url 'accounts:forgot_password_set' %}"
      hx-target="closest .auth-step-container"
      hx-swap="innerHTML"
      class="space-y-5">

    {% csrf_token %}

    <div>
        <label for="reset_new_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">رمز عبور جدید</label>
        <div class="relative" dir="ltr">
            <input type="password" id="reset_new_password" name="new_password"
                   class="w-full ps-4 pe-10 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="رمز عبور جدید خود را وارد کنید" required dir="ltr">
            <button type="button" tabindex="-1" class="absolute end-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" onclick="togglePassword('reset_new_password')" aria-label="نمایش/مخفی‌کردن رمز">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </button>
        </div>
        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">رمز عبور باید حداقل ۸ کاراکتر باشد</p>
    </div>

    <div>
        <label for="reset_confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">تکرار رمز عبور جدید</label>
        <div class="relative" dir="ltr">
            <input type="password" id="reset_confirm_password" name="confirm_password"
                   class="w-full ps-4 pe-10 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="رمز عبور جدید را مجدداً وارد کنید" required dir="ltr">
            <button type="button" tabindex="-1" class="absolute end-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" onclick="togglePassword('reset_confirm_password')" aria-label="نمایش/مخفی‌کردن رمز">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </button>
        </div>
    </div>

    {% if error %}
        <p class="text-red-500 text-xs">{{ error }}</p>
    {% endif %}

    <button type="submit" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-primary-grad hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
        ثبت رمز عبور جدید
    </button>
</form>
