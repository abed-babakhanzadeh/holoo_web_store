<div class="text-center mb-8">
    <h2 class="text-2xl font-bold text-dark dark:text-light mb-2">بازیابی رمز عبور</h2>
    <p class="text-gray-500 dark:text-gray-400">شماره موبایل حساب خود را وارد کنید تا کد بازیابی برایتان پیامک شود</p>
</div>

<form hx-post="{% url 'accounts:forgot_password_send' %}"
      hx-target="closest .auth-step-container"
      hx-swap="innerHTML"
      class="space-y-5">

    {% csrf_token %}

    <div>
        <label for="forgot_phone_number" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">شماره موبایل</label>
        <div class="relative">
            <input type="tel"
                   id="forgot_phone_number"
                   name="phone_number"
                   class="w-full ps-12 pe-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="09xxxxxxxxx"
                   required dir="ltr" autofocus>
            <div class="absolute input-icon top-1/2 transform -translate-y-1/2 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
            </div>
        </div>
    </div>

    {% if error %}
        <p class="text-red-500 text-xs">{{ error }}</p>
    {% endif %}

    <button type="submit" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-primary-grad hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
        ارسال کد بازیابی
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ms-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
    </button>
</form>

<button type="button"
        hx-get="{% url 'accounts:login_tabs' %}"
        hx-target="closest .auth-step-container"
        hx-swap="innerHTML"
        class="mt-4 w-full text-gray-400 hover:text-primary text-sm font-medium">
    بازگشت به ورود
</button>
