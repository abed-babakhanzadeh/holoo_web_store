<div class="text-center mb-8">
    <h2 class="text-2xl font-bold text-dark dark:text-light mb-2">تکمیل پروفایل و آدرس</h2>
    <p class="text-gray-500 dark:text-gray-400">جهت یکپارچه‌سازی با سیستم حسابداری هلو و ارسال مرسولات، لطفاً اطلاعات زیر را دقیق وارد کنید</p>
</div>

<form hx-post="{% url 'accounts:profile_complete' %}"
      hx-target="#profile-container"
      hx-swap="innerHTML"
      class="space-y-5">

    {% csrf_token %}

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
            <label for="first_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">نام</label>
            <input type="text" id="first_name" name="first_name"
                   class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="مثال: علی" value="{{ first_name|default_if_none:'' }}" required>
        </div>
        <div>
            <label for="last_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">نام خانوادگی</label>
            <input type="text" id="last_name" name="last_name"
                   class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="مثال: محمدی" value="{{ last_name|default_if_none:'' }}" required>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
            <label for="national_code" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">کد ملی</label>
            <input type="text" id="national_code" name="national_code" maxlength="10"
                   class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white text-center tracking-wider"
                   placeholder="۱۰ رقم" value="{{ national_code|default_if_none:'' }}" required dir="ltr">
        </div>
        <div>
            <label for="postal_code" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">کد پستی</label>
            <input type="text" id="postal_code" name="postal_code" maxlength="10"
                   class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white text-center tracking-wider"
                   placeholder="۱۰ رقم" value="{{ postal_code|default_if_none:'' }}" required dir="ltr">
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
            <label for="state" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">استان</label>
            <input type="text" id="state" name="state"
                   class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="مثال: قم" value="{{ state|default_if_none:'' }}" required>
        </div>
        <div>
            <label for="city" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">شهر</label>
            <input type="text" id="city" name="city"
                   class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                   placeholder="مثال: قم" value="{{ city|default_if_none:'' }}" required>
        </div>
    </div>

    <div>
        <label for="address" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">آدرس دقیق پستی</label>
        <textarea id="address" name="address"
                  class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white resize-none h-24"
                  placeholder="خیابان، کوچه، پلاک، واحد..." required>{{ address|default_if_none:'' }}</textarea>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">تعیین رمز عبور</label>
            <div class="relative">
                <input type="password" id="password" name="password"
                       class="w-full ps-4 pe-10 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                       placeholder="یک رمز عبور انتخاب کنید" required dir="ltr">
                <button type="button" class="absolute end-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" onclick="togglePassword('password')" aria-label="نمایش/مخفی‌کردن رمز">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
            <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">حداقل ۸ کاراکتر؛ برای ورودهای بعدی از تب «ورود با رمز عبور» استفاده کنید</p>
        </div>
        <div>
            <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">تکرار رمز عبور</label>
            <div class="relative">
                <input type="password" id="confirm_password" name="confirm_password"
                       class="w-full ps-4 pe-10 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                       placeholder="رمز عبور را دوباره وارد کنید" required dir="ltr">
                <button type="button" class="absolute end-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" onclick="togglePassword('confirm_password')" aria-label="نمایش/مخفی‌کردن رمز">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    {% if error %}
        <p class="text-red-500 text-sm">{{ error }}</p>
    {% endif %}

    <button type="submit" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-primary-grad hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
        ثبت و فعال‌سازی حساب
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ms-2" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
        </svg>
    </button>
</form>
