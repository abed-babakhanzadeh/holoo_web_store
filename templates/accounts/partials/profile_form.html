<div class="text-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">تکمیل پروفایل</h2>
    <p class="text-gray-500 text-sm mt-2">جهت یکپارچه‌سازی حساب با نرم‌افزار حسابداری و امکان خرید، لطفا اطلاعات زیر را دقیق وارد کنید.</p>
</div>

<form hx-post="{% url 'accounts:profile_complete' %}" 
      hx-target="#profile-container" 
      hx-swap="innerHTML">
    
    {% csrf_token %}
    
    <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="first_name">نام</label>
        <input class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-orange-500" 
               id="first_name" name="first_name" type="text" placeholder="مثال: علی" 
               value="{{ first_name|default_if_none:'' }}" required>
    </div>

    <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="last_name">نام خانوادگی</label>
        <input class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-orange-500" 
               id="last_name" name="last_name" type="text" placeholder="مثال: محمدی" 
               value="{{ last_name|default_if_none:'' }}" required>
    </div>

    <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="national_code">کد ملی</label>
        <input class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-orange-500 text-center tracking-wider" 
               id="national_code" name="national_code" type="text" maxlength="10" placeholder="0012345678" 
               value="{{ national_code|default_if_none:'' }}" required dir="ltr">
    </div>

    {% if error %}
        <p class="text-red-500 text-sm italic mb-4">{{ error }}</p>
    {% endif %}

    <button class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded w-full transition duration-200" 
            type="submit">
        ثبت و فعال‌سازی حساب
    </button>
</form>
