{% if products %}
<div class="relative">
    <div class="swiper product-carousel" style="padding-inline: 0.625rem;" aria-label="جدیدترین محصولات">
        <div class="swiper-wrapper items-center" style="padding-bottom: 0 !important;">
            {% for product in products %}
            <div class="swiper-slide py-2" style="padding-inline: 0.375rem;">
                {% include 'products/partials/product_card.html' %}
            </div>
            {% endfor %}
        </div>
        <div class="swiper-button-next bg-white rounded-full dark:bg-zinc-800 border border-gray-200 !size-12 after:!text-xl px-3 after:text-primary" aria-label="محصول بعدی"></div>
        <div class="swiper-button-prev bg-white rounded-full dark:bg-zinc-800 border border-gray-200 !size-12 after:!text-xl px-3 after:text-primary" aria-label="محصول قبلی"></div>
    </div>
</div>
{% else %}
<div class="col-span-12 py-16 text-center bg-white dark:bg-gray-800 rounded-xl border border-dashed border-gray-200 dark:border-gray-700">
    <span class="text-4xl block mb-3">🔍</span>
    <h4 class="text-lg font-bold text-gray-600 dark:text-white">محصولی یافت نشد!</h4>
</div>
{% endif %}
