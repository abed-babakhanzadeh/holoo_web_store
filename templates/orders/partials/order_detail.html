<div class="mt-4 pt-4 border-t border-dashed border-gray-200 animate-fade-in-down">
    <h4 class="text-xs font-bold text-gray-600 mb-3">🧾 اقلام خریداری شده:</h4>
    
    <div class="space-y-2">
        {% for item in order.items.all %}
        <div class="flex justify-between items-center bg-gray-50 px-3 py-2 rounded-lg text-sm">
            <div class="flex items-center gap-3">
                <!-- تغییر x به عدد و زیباسازی ظاهر آن -->
                <span class="font-black text-orange-600 text-xs bg-orange-100 px-2 py-1 rounded-md shadow-sm border border-orange-200">
                    {{ item.quantity }} {{ item.product.unit }}
                </span>
                <span class="text-gray-700 font-bold">{{ item.product.name }}</span>
            </div>
            <span class="text-gray-600 font-bold">{{ item.price|floatformat:0 }} <span class="text-[10px] font-normal">تومان</span></span>
        </div>
        {% endfor %}
    </div>

    <div class="mt-3 flex justify-between items-center text-xs text-gray-500 bg-gray-100 px-3 py-2 rounded-lg">
        <span>📦 هزینه ارسال و بسته‌بندی: <b class="text-gray-700">{{ order.shipping_cost|floatformat:0 }} تومان</b></span>
        <span>💳 روش پرداخت: <b class="text-gray-700">{{ order.get_payment_method_display }}</b></span>
    </div>
    
    <button onclick="document.getElementById('order-detail-{{ order.id }}').innerHTML=''" class="w-full text-center mt-3 text-xs text-red-400 hover:text-red-600 transition font-bold border-t pt-2">
        ✖ بستن جزئیات
    </button>
</div>
