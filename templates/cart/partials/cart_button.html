<div id="cart-btn-{{ product.id }}" class="w-full">
    {% if cart_item and cart_item.quantity > 0 %}
        <!-- حالت دوم: کالا در سبد خرید وجود دارد (دکمه کنترل تعداد) -->
        <div class="flex items-center justify-between border-2 border-red-500 rounded-xl px-2 py-1 bg-white shadow-sm w-full md:w-64 mx-auto md:mx-0">
            
            <!-- دکمه افزودن (+) -->
            <button hx-post="{% url 'cart:add_to_cart' product.id %}" 
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-target="#cart-btn-{{ product.id }}" 
                    hx-swap="outerHTML" 
                    class="text-red-500 font-bold text-2xl hover:bg-red-50 w-10 h-10 rounded-full flex items-center justify-center transition disabled:opacity-50" 
                    {% if cart_item.quantity >= product.stock %}disabled{% endif %}>
                +
            </button>

            <!-- نمایش تعداد و متن راهنما -->
            <div class="flex flex-col items-center px-4">
                <span class="text-red-500 font-bold text-xl leading-none">{{ cart_item.quantity }}</span>
                <span class="text-[10px] text-gray-400 font-normal mt-1">در سبد شما</span>
            </div>

            <!-- دکمه کاهش / حذف (-) -->
            <button hx-post="{% url 'cart:decrease_cart' product.id %}" 
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-target="#cart-btn-{{ product.id }}" 
                    hx-swap="outerHTML" 
                    class="text-red-500 font-bold text-2xl hover:bg-red-50 w-10 h-10 rounded-full flex items-center justify-center transition">
                {% if cart_item.quantity == 1 %}
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                {% else %}
                    -
                {% endif %}
            </button>
        </div>
    {% else %}
        <!-- حالت اول: کالا در سبد نیست (دکمه افزودن معمولی) -->
        <button hx-post="{% url 'cart:add_to_cart' product.id %}" 
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-target="#cart-btn-{{ product.id }}"
                hx-swap="outerHTML"
                class="w-full md:w-64 bg-red-500 hover:bg-red-600 text-white font-bold text-lg py-3 rounded-xl shadow-lg shadow-red-200 transition duration-300 disabled:bg-gray-300 disabled:shadow-none flex items-center justify-center gap-2" 
                {% if product.stock <= 0 %}disabled{% endif %}>
            {% if product.stock > 0 %}🛒 افزودن به سبد{% else %}❌ ناموجود{% endif %}
        </button>
    {% endif %}
</div>
